AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: OL Portal backend — DynamoDB data layer, Lambda API, Cognito auth.

Globals:
  Function:
    Runtime: nodejs24.x
    Architectures: [arm64]
    Timeout: 10
    MemorySize: 256

Resources:
  PortalTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: ol-portal
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: ol-portal
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      AutoVerifiedAttributes: [email]
      UsernameConfiguration:
        CaseSensitive: false

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: portal-web
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  AdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: Admin
      UserPoolId: !Ref UserPool

  LabLeaderGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: LabLeader
      UserPoolId: !Ref UserPool

  SubcontractorGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: Subcontractor
      UserPoolId: !Ref UserPool

  PortalApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - https://main.d2rvkunvze2ixv.amplifyapp.com
          - http://localhost:8761
        AllowMethods: [GET, POST, PATCH, DELETE, OPTIONS]
        AllowHeaders: [Authorization, Content-Type]
      Auth:
        DefaultAuthorizer: CognitoJwt
        Authorizers:
          CognitoJwt:
            JwtConfiguration:
              issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}
              audience:
                - !Ref UserPoolClient
            IdentitySource: $request.header.Authorization

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ol-portal-api
      CodeUri: src/
      Handler: app.handler
      Environment:
        Variables:
          TABLE_NAME: !Ref PortalTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PortalTable
      Events:
        GetRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref PortalApi
            Path: /{proxy+}
            Method: GET
        PostRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref PortalApi
            Path: /{proxy+}
            Method: POST
        PatchRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref PortalApi
            Path: /{proxy+}
            Method: PATCH
        DeleteRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref PortalApi
            Path: /{proxy+}
            Method: DELETE

Outputs:
  ApiUrl:
    Value: !Sub https://${PortalApi}.execute-api.${AWS::Region}.amazonaws.com
  UserPoolId:
    Value: !Ref UserPool
  UserPoolClientId:
    Value: !Ref UserPoolClient
  TableName:
    Value: !Ref PortalTable
